name: Unity iOS Build (Automatic Signing)

on:
  workflow_call:
    inputs:
      unity_version:
        required: true
        type: string
        description: 'Unity version to use (e.g., 2022.3.26f1)'
      build_method:
        required: true
        type: string
        description: 'Unity build method to call (e.g., RemoteBuilder.BuildiOS)'
      repository:
        required: true
        type: string
        description: 'Repository to build'
      artifact_name:
        required: true
        type: string
        description: 'Name for the artifact to upload'
      team_id:
        required: true
        type: string
        description: 'Apple Team ID'
      app_bundle_id:
        required: true
        type: string
        description: 'iOS app bundle identifier (e.g., com.luckyjackpotcasino.kenocasino)'
      runner_label:
        required: false
        type: string
        default: 'self-hosted'
        description: 'Runner label to use (default: self-hosted, or macos-secondary for secondary runner)'
      match_username:
        required: false
        type: string
        default: 'stephen@luckyjackpotcasino.com'
        description: 'Apple ID email for Match (default: LuckyJackpot, override for FVG apps)'
    secrets:
      GH_SSH_KEY:
        required: false
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_API_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY_CONTENT:
        required: true
      IOS_DISTRIBUTION_CERT_P12:
        required: true
      IOS_DISTRIBUTION_CERT_PASSWORD:
        required: true
      MATCH_PASSWORD:
        required: false
      MATCH_GIT_URL:
        required: false

jobs:
  build:
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 180
    env:
      API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      TEAM_ID: ${{ inputs.team_id }}
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    
    steps:
      - name: Update Repository (Persistent Workspace)
        run: |
          # Configure SSH
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          
          # Check if this is first run (no .git folder)
          if [ ! -d ".git" ]; then
            echo "🆕 First build - cloning repository..."
            git clone --depth 1 --recurse-submodules --shallow-submodules \
              git@github.com:${{ inputs.repository }}.git .
          else
            echo "♻️  Workspace exists - updating (much faster!)..."
            git fetch --depth 1 origin master
            git reset --hard origin/master
            git submodule foreach --recursive 'git clean -ffdx && git reset --hard' 2>/dev/null || true
            git submodule update --init --recursive --depth 1
          fi
          
          echo "✅ Repository ready (Library folder preserved for speed)"
          
          # Detect Unity version change and clean Library if needed
          EXPECTED_UNITY="${{ inputs.unity_version }}"
          CACHED_UNITY=""
          if [ -f "Library/.unity_version_cache" ]; then
            CACHED_UNITY=$(cat Library/.unity_version_cache)
          fi
          NEED_CLEAN=false
          if [ "$CACHED_UNITY" != "$EXPECTED_UNITY" ]; then
            echo "⚠️  Unity version changed ($CACHED_UNITY -> $EXPECTED_UNITY)"
            NEED_CLEAN=true
          fi
          # Also detect stale PackageCache from incompatible Unity versions
          if [ -d "Library/PackageCache" ] && ls Library/PackageCache/com.unity.serialization@* 1>/dev/null 2>&1; then
            echo "⚠️  Found stale com.unity.serialization in PackageCache"
            NEED_CLEAN=true
          fi
          if [ "$NEED_CLEAN" = true ]; then
            echo "🗑️  Clearing Library cache..."
            rm -rf Library/
            mkdir -p Library
            echo "$EXPECTED_UNITY" > Library/.unity_version_cache
            echo "🗑️  Library cleared - Unity will reimport assets (this build will be slower)"
          else
            echo "✅ Library cache matches Unity $EXPECTED_UNITY"
          fi

      # No cache needed - Library folder stays on disk between builds!
      
      - name: Build iOS with Unity
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          JOB_NAME: ${{ github.workflow }}
        run: |
          UNITY_PATH="/Applications/Unity/Hub/Editor/${{ inputs.unity_version }}/Unity.app/Contents/MacOS/Unity"
          
          # Unique log file per runner/build to prevent conflicts
          UNITY_LOG="/tmp/unity-build-${{ github.run_id }}-${{ github.run_attempt }}.log"
          
          # Fallback to any available Unity version if exact version not found
          if [ ! -f "$UNITY_PATH" ]; then
            UNITY_PATH=$(find /Applications/Unity/Hub/Editor -name "Unity" -type f | head -1)
            echo "⚠️  Using Unity at: $UNITY_PATH"
          fi
          
          echo "🎮 Starting Unity iOS build..."
          echo "Build Method: ${{ inputs.build_method }}"
          echo "Build Number: $BUILD_NUMBER"
          echo "Log File: $UNITY_LOG"
          
          # Run Unity build to generate Xcode project
          "$UNITY_PATH" \
            -quit \
            -batchmode \
            -nographics \
            -projectPath "$(pwd)" \
            -executeMethod ${{ inputs.build_method }} \
            -logFile "$UNITY_LOG"
          
          UNITY_EXIT=$?
          
          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo "Unity Build Log (last 100 lines):"
          echo "═══════════════════════════════════════════════════════════"
          tail -100 "$UNITY_LOG"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          
          # Unity can exit 0 even when the build fails internally.
          # Check only the LAST "Build Finished" line (Unity may retry and succeed).
          LAST_BUILD_RESULT=$(grep "Build Finished, Result:" "$UNITY_LOG" 2>/dev/null | tail -1)
          if echo "$LAST_BUILD_RESULT" | grep -q "Failure"; then
            echo "❌ Unity build reported internal failure!"
            echo "Compilation errors:"
            grep "error CS" "$UNITY_LOG" | head -10
            exit 1
          fi
          
          if [ $UNITY_EXIT -ne 0 ]; then
            echo "❌ Unity build failed with exit code: $UNITY_EXIT"
            exit $UNITY_EXIT
          fi
          
          echo "✅ Unity build command completed"
      
      - name: Verify iOS Project Created
        run: |
          echo "📂 Checking for iOS project..."
          if [ -d "IosProjectFolder" ]; then
            echo "✅ IosProjectFolder exists!"
            ls -la IosProjectFolder/ | head -20
          else
            echo "❌ IosProjectFolder not found. Unity build failed!"
            exit 1
          fi
      
      - name: Add Export Compliance to Info.plist
        working-directory: IosProjectFolder
        run: |
          echo "🔐 Adding encryption export compliance..."
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" Info.plist
          echo "✅ Export compliance added (None of the algorithms mentioned)"
      
      - name: Verify GADApplicationIdentifier in Info.plist
        working-directory: IosProjectFolder
        run: |
          GAD_ID=$(/usr/libexec/PlistBuddy -c "Print :GADApplicationIdentifier" Info.plist 2>/dev/null || echo "")
          if [ -z "$GAD_ID" ]; then
            echo "⚠️  GADApplicationIdentifier missing from Info.plist — injecting from GoogleMobileAdsSettings.asset"
            APP_ID=$(grep "adMobIOSAppId:" ../Assets/GoogleMobileAds/Resources/GoogleMobileAdsSettings.asset | awk '{print $2}')
            if [ -n "$APP_ID" ]; then
              /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string $APP_ID" Info.plist
              echo "✅ Set GADApplicationIdentifier: $APP_ID"
            else
              echo "❌ Could not find adMobIOSAppId in GoogleMobileAdsSettings.asset!"
              exit 1
            fi
          else
            echo "✅ GADApplicationIdentifier already present: $GAD_ID"
          fi
      
      - name: Setup Signing with Fastlane Match
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
        run: |
          echo "🔐 Setting up CI keychain for codesigning..."
          
          # Save current default keychain so we can restore it in cleanup
          ORIGINAL_DEFAULT_KEYCHAIN=$(security default-keychain -d user | xargs)
          echo "ORIGINAL_DEFAULT_KEYCHAIN=$ORIGINAL_DEFAULT_KEYCHAIN" >> "$GITHUB_ENV"
          
          # Per-run keychain avoids conflicts between parallel builds
          CI_KEYCHAIN_PATH="$HOME/Library/Keychains/ci-build-${{ github.run_id }}.keychain-db"
          CI_KEYCHAIN_PASSWORD="ci-build-$(openssl rand -hex 12)"
          
          # Only remove THIS build's keychain if it exists from a previous attempt.
          # Use rm instead of security delete-keychain to avoid disrupting concurrent builds.
          if [ -f "$CI_KEYCHAIN_PATH" ]; then
            echo "🗑️  Removing previous keychain for this run: $(basename "$CI_KEYCHAIN_PATH")"
            rm -f "$CI_KEYCHAIN_PATH"
          fi
          
          # Create fresh keychain for this build
          security create-keychain -p "$CI_KEYCHAIN_PASSWORD" "$CI_KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$CI_KEYCHAIN_PATH"
          security unlock-keychain -p "$CI_KEYCHAIN_PASSWORD" "$CI_KEYCHAIN_PATH"
          
          # APPEND our keychain to the existing search list (preserving concurrent builds).
          # Filter out any dead keychains and always ensure login is present.
          EXISTING_KC=$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          security list-keychains -d user -s $EXISTING_KC "$CI_KEYCHAIN_PATH"
          
          echo "CI_KEYCHAIN_PATH=$CI_KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "CI_KEYCHAIN_PASSWORD=$CI_KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          echo "✅ CI keychain ready: $CI_KEYCHAIN_PATH"
          
          # Use Homebrew-installed fastlane (already installed on build server)
          if command -v /opt/homebrew/bin/fastlane &> /dev/null; then
            FASTLANE=/opt/homebrew/bin/fastlane
            echo "✅ Using Homebrew fastlane: $($FASTLANE --version)"
          else
            echo "❌ Fastlane not found! Install it with: brew install fastlane"
            exit 1
          fi
          
          # DEVELOPER_DIR is set at job level (env) - verify it's working
          echo "✅ Using Xcode at: $DEVELOPER_DIR"
          xcodebuild -version
          
          # Setup App Store Connect API key
          if [ -z "${{ env.API_KEY_CONTENT }}" ]; then
            echo "❌ API_KEY_CONTENT is empty! Check your secrets configuration."
            exit 1
          fi
          
          PRIVATE_KEYS_DIR="$HOME/private_keys/${{ github.run_id }}"
          mkdir -p "$PRIVATE_KEYS_DIR"
          echo "PRIVATE_KEYS_DIR=$PRIVATE_KEYS_DIR" >> "$GITHUB_ENV"
          echo "${{ env.API_KEY_CONTENT }}" | base64 --decode > "$PRIVATE_KEYS_DIR/AuthKey_${{ env.API_KEY_ID }}.p8"
          
          # Verify the key was created successfully
          if [ ! -s "$PRIVATE_KEYS_DIR/AuthKey_${{ env.API_KEY_ID }}.p8" ]; then
            echo "❌ Failed to create AuthKey file! The decoded content is empty."
            echo "This usually means API_KEY_CONTENT is not a valid base64-encoded .p8 file."
            exit 1
          fi
          
          chmod 600 "$PRIVATE_KEYS_DIR/AuthKey_${{ env.API_KEY_ID }}.p8"
          echo "✅ AuthKey file created: $PRIVATE_KEYS_DIR/AuthKey_${{ env.API_KEY_ID }}.p8"
          
          # Create Match configuration
          mkdir -p fastlane
          cat > fastlane/Matchfile << 'MATCHFILE'
          git_url(ENV["MATCH_GIT_URL"])
          storage_mode("git")
          type("appstore")
          git_branch("main")
          username("${{ inputs.match_username }}")
          team_id("${{ env.TEAM_ID }}")
          app_identifier(["${{ inputs.app_bundle_id }}"])
          MATCHFILE
          
          cat > fastlane/Fastfile << 'FASTFILE'
          default_platform(:ios)
          
          platform :ios do
            lane :sync do
              api_key = app_store_connect_api_key(
                key_id: ENV["API_KEY_ID"],
                issuer_id: ENV["API_ISSUER_ID"],
                key_filepath: "#{ENV['PRIVATE_KEYS_DIR']}/AuthKey_#{ENV['API_KEY_ID']}.p8",
                in_house: false
              )
              
              match(
                type: "appstore",
                api_key: api_key,
                keychain_name: ENV["CI_KEYCHAIN_PATH"],
                keychain_password: ENV["CI_KEYCHAIN_PASSWORD"],
                readonly: false,
                verbose: true
              )
            end
          end
          FASTFILE
          
          export API_KEY_ID="${{ env.API_KEY_ID }}"
          export API_ISSUER_ID="${{ env.API_ISSUER_ID }}"
          export PRIVATE_KEYS_DIR="$PRIVATE_KEYS_DIR"
          export CI_KEYCHAIN_PATH="$CI_KEYCHAIN_PATH"
          export CI_KEYCHAIN_PASSWORD="$CI_KEYCHAIN_PASSWORD"
          
          echo "🔐 Syncing certificates and profiles with Match..."
          $FASTLANE sync
          
          # Explicitly import the distribution certificate p12 with -A (allow any app).
          # Match imports it too, but the explicit import with -A ensures codesign can
          # access the private key without partition list issues.
          if [ -n "${{ secrets.IOS_DISTRIBUTION_CERT_P12 }}" ]; then
            echo "🔑 Importing distribution certificate..."
            CERT_P12_PATH="/tmp/dist-cert-${{ github.run_id }}.p12"
            echo "${{ secrets.IOS_DISTRIBUTION_CERT_P12 }}" | base64 --decode > "$CERT_P12_PATH"
            security import "$CERT_P12_PATH" \
              -k "$CI_KEYCHAIN_PATH" \
              -P "${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}" \
              -A
            rm -f "$CERT_P12_PATH"
          fi
          
          echo "🔓 Allow codesign to access keys (partition list)..."
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$CI_KEYCHAIN_PASSWORD" "$CI_KEYCHAIN_PATH" 2>&1 | head -5 || true
          
          # Verify we have a valid signing identity
          IDENTITY_COUNT=$(security find-identity -v -p codesigning "$CI_KEYCHAIN_PATH" | grep -c "valid identities found" || true)
          security find-identity -v -p codesigning "$CI_KEYCHAIN_PATH"
          if security find-identity -v -p codesigning "$CI_KEYCHAIN_PATH" | grep -q "0 valid identities"; then
            echo "❌ No valid signing identities in keychain after import!"
            exit 1
          fi
          echo "✅ Signing identity verified"
          
          # Capture the installed profile UUID + name for later xcodebuild signing settings.
          # (Fastlane prints these but doesn't export them to subsequent steps.)
          # Find the provisioning profile that matches THIS app's bundle ID
          # (avoids race conditions when multiple builds run on the same runner)
          BUNDLE_ID="${{ inputs.app_bundle_id }}"
          PROFILE_PATH=""
          
          for SEARCH_DIR in "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" "$HOME/Library/MobileDevice/Provisioning Profiles"; do
            if [ -d "$SEARCH_DIR" ]; then
              for PP in "$SEARCH_DIR"/*.mobileprovision; do
                [ -f "$PP" ] || continue
                PP_CONTENT=$(security cms -D -i "$PP" 2>/dev/null) || continue
                PP_BUNDLE=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /dev/stdin <<< "$PP_CONTENT" 2>/dev/null)
                # application-identifier includes team prefix: "D3H7LWSJL6.com.example.app"
                if echo "$PP_BUNDLE" | grep -q "$BUNDLE_ID"; then
                  PROFILE_PATH="$PP"
                  break 2
                fi
              done
            fi
          done
          
          if [ -z "$PROFILE_PATH" ]; then
            echo "❌ No provisioning profile found for bundle ID: $BUNDLE_ID"
            echo "Checked locations:"
            echo "  - $HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/"
            echo "  - $HOME/Library/MobileDevice/Provisioning Profiles/"
            echo "Available profiles:"
            for SEARCH_DIR in "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" "$HOME/Library/MobileDevice/Provisioning Profiles"; do
              ls -la "$SEARCH_DIR"/*.mobileprovision 2>/dev/null || true
            done
            exit 1
          fi
          
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          
          echo "✅ Match installed profile:"
          echo "  - Path: $PROFILE_PATH"
          echo "  - UUID: $PROFILE_UUID"
          echo "  - Name: $PROFILE_NAME"
          
          echo "MATCH_PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "MATCH_PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          
          echo "✅ Match completed - certificates and profiles ready"
      
      - name: Install CocoaPods Dependencies
        working-directory: IosProjectFolder
        run: |
          export LC_ALL=en_US.UTF-8
          POD=/opt/homebrew/bin/pod
          
          $POD deintegrate || true
          rm -rf Pods Podfile.lock
          $POD cache clean --all 2>/dev/null || true
          
          echo "📋 EDM4U-generated Podfile:"
          cat Podfile
          echo ""
          echo "---"
          
          # EDM4U puts all pods under the UnityFramework target only and uses
          # static linkage.  Facebook SDK ships as dynamic XCFrameworks that
          # must be embedded in the app bundle.
          # Fix:
          #   1. Force dynamic linkage with use_frameworks! (replaces EDM4U's
          #      :linkage => :static so CocoaPods builds dynamic frameworks).
          #   2. Copy pod declarations into the Unity-iPhone target so
          #      CocoaPods creates the "Embed Frameworks" build phase.
          python3 - << 'PYEOF'
          import re

          podfile = open("Podfile").read()

          # --- Step 1: ensure use_frameworks! (dynamic) ---
          # EDM4U generates  use_frameworks! :linkage => :static
          # Replace it with plain  use_frameworks!  so pods are dynamic.
          podfile = re.sub(
              r"use_frameworks!\s*:linkage\s*=>\s*:static",
              "use_frameworks!",
              podfile,
          )
          if "use_frameworks!" not in podfile:
              podfile = "use_frameworks!\n" + podfile
              print("Added use_frameworks! to Podfile")
          else:
              print("✅ use_frameworks! present (dynamic linkage)")

          # --- Step 2: copy pods into Unity-iPhone target ---
          uf_header = re.search(r"target\s+['\"]UnityFramework['\"]\s+do\s*\n", podfile)
          if not uf_header:
              print("⚠️  No UnityFramework target found — skipping")
              open("Podfile", "w").write(podfile)
              exit(0)

          uf_end = re.search(r"^end\b", podfile[uf_header.end():], re.MULTILINE)
          if not uf_end:
              print("⚠️  No 'end' for UnityFramework target — skipping")
              open("Podfile", "w").write(podfile)
              exit(0)

          uf_body = podfile[uf_header.end() : uf_header.end() + uf_end.start()]
          pod_lines = [l for l in uf_body.splitlines() if l.strip().startswith("pod ")]

          if not pod_lines:
              print("ℹ️  No pod declarations in UnityFramework target")
              open("Podfile", "w").write(podfile)
              exit(0)

          print(f"Found {len(pod_lines)} pod(s) in UnityFramework:")
          for l in pod_lines:
              print(f"  {l.strip()}")

          ip_header = re.search(r"target\s+['\"]Unity-iPhone['\"]\s+do\s*\n", podfile)
          if not ip_header:
              print("⚠️  No Unity-iPhone target found — skipping")
              open("Podfile", "w").write(podfile)
              exit(0)

          ip_end = re.search(r"^end\b", podfile[ip_header.end():], re.MULTILINE)
          if not ip_end:
              print("⚠️  No 'end' for Unity-iPhone target — skipping")
              open("Podfile", "w").write(podfile)
              exit(0)

          ip_body = podfile[ip_header.end() : ip_header.end() + ip_end.start()]
          if any("pod " in l for l in ip_body.splitlines()):
              print("ℹ️  Unity-iPhone already has pod declarations — skipping")
              open("Podfile", "w").write(podfile)
              exit(0)

          insert_at = ip_header.end() + ip_end.start()
          pod_block = "\n".join("  " + l.strip() for l in pod_lines) + "\n"
          new_podfile = podfile[:insert_at] + pod_block + podfile[insert_at:]

          open("Podfile", "w").write(new_podfile)
          print(f"✅ Copied {len(pod_lines)} pod declarations into Unity-iPhone target")
          PYEOF
          
          echo ""
          echo "📋 Podfile after fix:"
          cat Podfile
          echo ""
          echo "---"
          
          # Ensure CocoaPods repo is up to date
          $POD repo update 2>&1 | tail -5 || true
          
          echo "🔧 Running pod install..."
          $POD install --verbose 2>&1 | tee /tmp/pod-install-${{ github.run_id }}.log | tail -60
          POD_EXIT=${PIPESTATUS[0]}
          
          if [ $POD_EXIT -ne 0 ]; then
            echo "❌ pod install failed with exit code $POD_EXIT"
            echo "Full log:"
            cat /tmp/pod-install-${{ github.run_id }}.log
            exit $POD_EXIT
          fi
          
          # Verify pods were actually installed
          if [ ! -d "Pods/FBSDKCoreKit" ] && [ ! -d "Pods/FBSDKCoreKit.xcframework" ]; then
            echo "⚠️  FBSDKCoreKit not found in Pods directory after install"
            ls -la Pods/ | head -20
          fi
          
          echo "✅ CocoaPods dependencies installed"
      
      - name: Configure Xcode Project for Manual Signing
        working-directory: IosProjectFolder
        run: |
          echo "🔧 Configuring Xcode project for manual signing..."
          
          # Unity generates projects with automatic signing by default
          # Change to manual signing for CI with Match
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' Unity-iPhone.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' Unity-iPhone.xcodeproj/project.pbxproj
          
          # Wire the Match profile into Unity's pbxproj indirection variables
          # (Unity uses PROVISIONING_PROFILE(_SPECIFIER)_APP, which then gets referenced by targets)
          sed -i '' "s/PROVISIONING_PROFILE_APP = \"\";/PROVISIONING_PROFILE_APP = \"${MATCH_PROFILE_UUID}\";/g" Unity-iPhone.xcodeproj/project.pbxproj
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER_APP = \"\";/PROVISIONING_PROFILE_SPECIFIER_APP = \"${MATCH_PROFILE_NAME}\";/g" Unity-iPhone.xcodeproj/project.pbxproj
          
          # Ensure we sign with Distribution for Release archives
          sed -i '' 's/CODE_SIGN_IDENTITY = \"iPhone Developer\";/CODE_SIGN_IDENTITY = \"Apple Distribution\";/g' Unity-iPhone.xcodeproj/project.pbxproj
          
          echo "✅ Project configured for manual signing"
      
      - name: Clean Xcode Build
        working-directory: IosProjectFolder
        run: |
          echo "🧹 Deep cleaning Xcode build..."
          rm -rf build DerivedData
          
          # Clear shared module cache to prevent cross-build contamination
          rm -rf ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex 2>/dev/null || true
          
          # Verify Pods directory exists and has frameworks
          if [ -d "Pods" ]; then
            echo "📦 Pods directory contents:"
            ls -la Pods/ | head -20
            POD_FRAMEWORKS=$(find Pods -name "*.framework" -maxdepth 3 2>/dev/null | head -5)
            if [ -n "$POD_FRAMEWORKS" ]; then
              echo "✅ Pod frameworks found:"
              echo "$POD_FRAMEWORKS"
            else
              echo "⚠️  No pod frameworks found in Pods directory"
            fi
          else
            echo "❌ Pods directory not found!"
          fi
          
          xcodebuild clean \
            -workspace Unity-iPhone.xcworkspace \
            -scheme Unity-iPhone \
            -configuration Release \
            -destination 'generic/platform=iOS'
          
          echo "✅ Clean complete"
      
      - name: Build Xcode Archive (Distribution)
        working-directory: IosProjectFolder
        run: |
          echo "🔨 Building Xcode archive with automatic provisioning..."
          
          # Ensure CI keychain is unlocked for codesign
          security unlock-keychain -p "$CI_KEYCHAIN_PASSWORD" "$CI_KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$CI_KEYCHAIN_PASSWORD" "$CI_KEYCHAIN_PATH" 2>&1 | head -5 || true
          
          echo "🔐 Keychain search list:"
          security list-keychains -d user
          echo "🔐 Signing identities (CI keychain):"
          security find-identity -v -p codesigning "$CI_KEYCHAIN_PATH"
          
          # Clean DerivedData to avoid stale signing state
          rm -rf ~/Library/Developer/Xcode/DerivedData/Unity-iPhone-*
          
          # Use Fastlane Match for signing (industry standard)
          # Match provides certificate and provisioning profile
          # Manual signing for deterministic, reproducible builds
          # Signing settings are applied by editing Unity-iPhone.xcodeproj/project.pbxproj in the prior step.
          
          # Use unique DerivedData path to prevent parallel build conflicts
          DERIVED_DATA_PATH="$HOME/Library/Developer/Xcode/DerivedData/Build-${{ github.run_id }}-${{ github.run_attempt }}"
          
          # Clean DerivedData to prevent "Directory not empty" errors from stale build artifacts
          if [ -d "$DERIVED_DATA_PATH" ]; then
            echo "🧹 Cleaning stale DerivedData at $DERIVED_DATA_PATH..."
            rm -rf "$DERIVED_DATA_PATH"
          fi
          
          xcodebuild archive \
            -workspace Unity-iPhone.xcworkspace \
            -scheme Unity-iPhone \
            -configuration Release \
            -archivePath $GITHUB_WORKSPACE/Unity-iPhone.xcarchive \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -jobs 1 \
            DEVELOPMENT_TEAM=${{ env.TEAM_ID }} \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            OTHER_CODE_SIGN_FLAGS="--keychain $CI_KEYCHAIN_PATH" \
            | tee /tmp/xcodebuild-archive.log
          
          XCODE_EXIT=${PIPESTATUS[0]}
          
          if [ $XCODE_EXIT -ne 0 ]; then
            echo "❌ Xcode archive failed!"
            echo "Last 100 lines of build log:"
            tail -100 /tmp/xcodebuild-archive.log
            exit $XCODE_EXIT
          fi
          
          echo "✅ Xcode archive created for App Store distribution"
      
      - name: Export IPA
        run: |
          # Get bundle ID from Xcode project
          BUNDLE_ID=$(grep -A 2 "PRODUCT_BUNDLE_IDENTIFIER" IosProjectFolder/Unity-iPhone.xcodeproj/project.pbxproj | grep "com\." | head -1 | sed 's/.*= \(.*\);/\1/')
          
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ inputs.team_id }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>${{ env.MATCH_PROFILE_NAME }}</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          
          echo "📋 Export Options:"
          echo "  Bundle ID: $BUNDLE_ID"
          echo "  Match Profile Name: ${{ env.MATCH_PROFILE_NAME }}"
          echo "  Match Profile UUID: ${{ env.MATCH_PROFILE_UUID }}"
          echo "  Team ID: ${{ inputs.team_id }}"
          
          xcodebuild -exportArchive \
            -archivePath Unity-iPhone.xcarchive \
            -exportPath ./export \
            -exportOptionsPlist ExportOptions.plist
          
          echo "✅ IPA exported"
          ls -lh export/*.ipa
      
      - name: Upload to TestFlight
        run: |
          IPA=$(find export -name "*.ipa" | head -1)
          echo "📦 Uploading: $IPA"
          
          # Ensure AuthKey file exists (run-specific directory)
          AUTH_KEY_PATH="$PRIVATE_KEYS_DIR/AuthKey_${{ env.API_KEY_ID }}.p8"
          if [ ! -f "$AUTH_KEY_PATH" ]; then
            echo "❌ AuthKey file not found at: $AUTH_KEY_PATH"
            ls -la "$PRIVATE_KEYS_DIR/" || echo "private_keys directory doesn't exist"
            exit 1
          fi
          echo "✅ AuthKey file found: $AUTH_KEY_PATH"
          
          API_PRIVATE_KEYS_DIR="$PRIVATE_KEYS_DIR" xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey ${{ env.API_KEY_ID }} \
            --apiIssuer ${{ env.API_ISSUER_ID }}
          
          echo "✅ Uploaded to TestFlight!"
          echo "🎉 Build will appear in App Store Connect in 5-10 minutes"
      
      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up..."
          
          # Restore the original default keychain so other processes aren't broken
          if [ -n "$ORIGINAL_DEFAULT_KEYCHAIN" ] && [ -f "$ORIGINAL_DEFAULT_KEYCHAIN" ]; then
            echo "Restoring default keychain to: $ORIGINAL_DEFAULT_KEYCHAIN"
            security default-keychain -s "$ORIGINAL_DEFAULT_KEYCHAIN" || true
          else
            security default-keychain -s ~/Library/Keychains/login.keychain-db || true
          fi
          
          # Remove THIS run's CI keychain file directly (NOT security delete-keychain).
          # security delete-keychain modifies global keychain state and can cause
          # errSecInternalComponent in concurrent builds' codesign operations.
          if [ -n "$CI_KEYCHAIN_PATH" ] && [ -f "$CI_KEYCHAIN_PATH" ]; then
            rm -f "$CI_KEYCHAIN_PATH"
            echo "✅ Removed CI keychain file: $(basename $CI_KEYCHAIN_PATH)"
          fi
          
          # Clean up files
          rm -rf *_BackUpThisFolder_ButDontShipItWithYourGame
          rm -rf "$HOME/private_keys/${{ github.run_id }}" 2>/dev/null || true
          
          echo "✅ Cleanup complete (default keychain restored)"

